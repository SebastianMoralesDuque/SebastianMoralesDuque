name: Generate Snake Animation

on:
  schedule:
    - cron: "0 12 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v3

      - name: Generate snake animation (dark + light)
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-snake.svg
            dist/github-snake-dark.svg?palette=github-dark

      - name: Push to output branch
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git fetch origin output || true
          git checkout output 2>/dev/null || git checkout --orphan output
          cp dist/*.svg . 2>/dev/null || true
          git add -A
          git diff --cached --quiet || git commit -m "ci: update snake animation"
          git push --force origin output