name: Generate Pac-Man Animation

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v3

      - name: Generate Pac-Man (light + dark)
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-pacman.svg?color_snake=yellow&color_dots=#2563EB,#1e3a5f,#0f172a
            dist/github-pacman-dark.svg?palette=github-dark&color_snake=yellow&color_dots=#2563EB,#1e3a5f,#0f172a
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Push to output branch
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git fetch origin output || true
          git checkout output 2>/dev/null || git checkout --orphan output
          cp dist/*.svg . 2>/dev/null || true
          git add -A
          git diff --cached --quiet || git commit -m "ci: update Pac-Man animation"
          git push --force origin output